name: Android 持续集成

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Android 构建与测试
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 检出源码
        uses: actions/checkout@v4

      - name: 配置 JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: 配置 Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: 设置 Gradle Wrapper 执行权限
        run: chmod +x gradlew

      - name: 运行单元测试并构建调试 APK
        run: ./gradlew :app:testDebugUnitTest :app:assembleDebug --stacktrace
